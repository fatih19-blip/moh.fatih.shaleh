<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Mohammad Fatih</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sec { display: none; } .sec.active { display: block; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border-radius: 1.5rem; padding: 2rem 1.5rem; box-shadow: 0 15px 30px rgba(0,0,0,0.2); border: 2px solid #eee; min-height: 400px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#1c3a27] text-slate-800 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-[#2e523b] to-[#14281b] min-h-screen pb-20 font-sans">

    <header class="pt-8 pb-4 flex justify-center gap-3 sticky top-0 z-50 overflow-x-auto px-4 hide-scroll">
        <button onclick="tab('p')" id="b-p" class="w-16 h-16 md:w-20 md:h-20 bg-white border-4 border-yellow-400 rounded-full flex flex-col items-center justify-center shrink-0 shadow-xl scale-110 transition-all text-black">
            <span class="text-2xl">♠</span><b class="text-[9px]">PROFIL</b>
        </button>
        <button onclick="tab('r')" id="b-r" class="w-16 h-16 md:w-20 md:h-20 bg-slate-800 border-4 border-slate-600 rounded-full flex flex-col items-center justify-center shrink-0 shadow-xl transition-all text-white">
            <span class="text-2xl text-red-500">♥</span><b class="text-[9px]">RIWAYAT</b>
        </button>
        <button onclick="tab('k')" id="b-k" class="w-16 h-16 md:w-20 md:h-20 bg-slate-800 border-4 border-slate-600 rounded-full flex flex-col items-center justify-center shrink-0 shadow-xl transition-all text-white">
            <span class="text-2xl text-red-500">♦</span><b class="text-[9px]">KARYA</b>
        </button>
        <button onclick="tab('a')" id="b-a" class="w-16 h-16 md:w-20 md:h-20 bg-slate-800 border-4 border-slate-600 rounded-full flex flex-col items-center justify-center shrink-0 shadow-xl transition-all text-white">
            <span class="text-2xl text-slate-300">♣</span><b class="text-[9px]">ALBUM</b>
        </button>
    </header>

    <main class="max-w-2xl mx-auto px-4 mt-6">
        
        <div id="p" class="sec active">
            <div class="card text-center relative">
                <div id="btn-edit-profil"></div>
                
                <div class="w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-black mx-auto mb-5 overflow-hidden bg-slate-100 flex items-center justify-center shadow-inner relative">
                    <img id="p-img" class="w-full h-full object-cover hidden">
                    <i id="p-ico" class="fas fa-user-tie text-5xl text-slate-300"></i>
                    <input type="file" id="f-profil" class="hidden" accept="image/*" onchange="uploadFoto(this)">
                </div>
                
                <h1 id="p-name" class="text-3xl md:text-4xl font-serif font-bold text-slate-900">Nama Lengkap</h1>
                <p id="p-bio" class="text-slate-600 mt-3 text-sm md:text-base leading-relaxed">Deskripsi profil Anda ada di sini.</p>
            </div>
        </div>

        <div id="r" class="sec">
            <div class="card">
                <div class="flex justify-between items-center border-b pb-3 mb-5">
                    <h2 class="text-2xl font-serif font-bold text-red-700">Riwayat Perjalanan</h2>
                    <div id="btn-add-r"></div>
                </div>
                <div id="r-list" class="space-y-4"></div>
            </div>
        </div>

        <div id="k" class="sec">
            <div class="card">
                <div class="flex justify-between items-center border-b pb-3 mb-5">
                    <h2 class="text-2xl font-serif font-bold text-red-700">Karya & Proyek</h2>
                    <div id="btn-add-k"></div>
                </div>
                <div id="k-list" class="grid sm:grid-cols-2 gap-4"></div>
            </div>
        </div>

        <div id="a" class="sec">
            <div class="card">
                <div class="flex justify-between items-center border-b pb-3 mb-5">
                    <h2 class="text-2xl font-serif font-bold text-slate-900">Album Dokumentasi</h2>
                    <div id="btn-add-a"></div>
                </div>
                <div id="a-list" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
            </div>
        </div>
    </main>

    <footer class="mt-12 text-center">
        <button onclick="toggleAdmin()" id="log-btn" class="border-2 border-white/20 text-white/50 px-6 py-2 rounded-full text-xs font-bold hover:bg-white/10 transition">LOGIN ADMIN</button>
    </footer>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-[100] p-6 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl w-full max-w-md border-4 border-slate-900 shadow-2xl">
            <h3 id="m-title" class="font-bold text-xl mb-4 text-slate-900">Tambah Data</h3>
            <div class="space-y-4">
                <div id="loading" class="hidden text-center text-blue-600 font-bold text-xs animate-pulse bg-blue-50 p-2 rounded">Memproses Data (Auto Compress/Auto Link)...</div>
                
                <div class="bg-slate-50 p-3 rounded-lg border">
                    <label class="block text-xs font-bold mb-1">Opsi 1: Upload Foto</label>
                    <input type="file" id="m-file" class="w-full text-xs" accept="image/*">
                </div>
                
                <div class="bg-slate-50 p-3 rounded-lg border">
                    <label class="block text-xs font-bold mb-1">Opsi 2: Link (Otomatis jadi gambar jika kosong)</label>
                    <input type="url" id="m-link" placeholder="https://..." class="w-full border-2 p-2 rounded-lg text-sm outline-none focus:border-slate-900">
                </div>

                <input type="text" id="m-head" placeholder="Judul / Keterangan" class="w-full border-2 p-3 rounded-lg text-sm outline-none focus:border-slate-900 font-bold">
                
                <div class="flex gap-2 pt-2">
                    <button onclick="closeM()" class="flex-1 text-slate-500 font-bold border-2 rounded-lg py-3">Batal</button>
                    <button onclick="processSave()" id="save-btn" class="flex-1 bg-slate-900 text-white py-3 rounded-lg font-bold shadow-lg">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // INISIALISASI DATABASE LOKAL
        let db = { 
            p: JSON.parse(localStorage.getItem('f_p')) || {n: 'Mohammad Fatih Shaleh', b: 'Mahasiswa Manajemen Pendidikan. Berkembang melalui pengalaman organisasi intra dan ekstra kampus.', f: null},
            r: JSON.parse(localStorage.getItem('f_r')) || [],
            k: JSON.parse(localStorage.getItem('f_k')) || [],
            a: JSON.parse(localStorage.getItem('f_a')) || []
        };
        let isAdmin = false;
        let curType = '';

        // FUNGSI AUTO COMPRESS FOTO
        function compress(file, callback) {
            let reader = new FileReader();
            reader.onload = function(e) {
                let img = new Image();
                img.onload = function() {
                    let canvas = document.createElement('canvas');
                    let maxW = 800; 
                    let scale = maxW / img.width;
                    canvas.width = img.width > maxW ? maxW : img.width;
                    canvas.height = img.width > maxW ? img.height * scale : img.height;
                    let ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.8)); // 80% Kualitas
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // PINDAH TAB MENU
        function tab(id) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('header button').forEach(b => {
                b.className = "w-16 h-16 md:w-20 md:h-20 bg-slate-800 border-4 border-slate-600 rounded-full flex flex-col items-center justify-center shrink-0 shadow-xl transition-all text-white";
            });
            let activeBtn = document.getElementById('b-'+id);
            activeBtn.className = "w-16 h-16 md:w-20 md:h-20 bg-white border-4 border-yellow-400 rounded-full flex flex-col items-center justify-center shrink-0 shadow-xl scale-110 transition-all text-black";
        }

        // LOGIN ADMIN
        function toggleAdmin() {
            if(isAdmin) {
                isAdmin = false;
                alert("Anda telah Logout.");
            } else {
                let p = prompt("Masukkan Password:");
                if(p === "Fatih_123") {
                    isAdmin = true;
                    alert("Akses Admin Terbuka! Anda sekarang bisa Edit & Hapus.");
                } else { alert("Password Salah!"); return; }
            }
            render();
        }

        // EDIT PROFIL & FOTO
        function editProfil() {
            let n = prompt("Edit Nama Lengkap:", db.p.n);
            let b = prompt("Edit Bio/Deskripsi:", db.p.b);
            if(n !== null) db.p.n = n;
            if(b !== null) db.p.b = b;
            saveDB();
        }
        function gantiFoto() { if(isAdmin) document.getElementById('f-profil').click(); }
        function uploadFoto(input) {
            if(!input.files[0]) return;
            compress(input.files[0], (res) => { db.p.f = res; saveDB(); });
        }

        // RIWAYAT: TAMBAH & EDIT
        function addR() {
            let t = prompt("Tahun (Contoh: 2022-2024):");
            let i = prompt("Instansi / Organisasi:");
            if(t && i) { db.r.push({t, i}); saveDB(); }
        }
        function editR(idx) {
            let t = prompt("Edit Tahun:", db.r[idx].t);
            let i = prompt("Edit Instansi:", db.r[idx].i);
            if(t !== null) db.r[idx].t = t;
            if(i !== null) db.r[idx].i = i;
            saveDB();
        }

        // KARYA & ALBUM: MODAL DAN SAVE
        function openM(type) {
            curType = type;
            document.getElementById('m-title').innerText = type === 'k' ? "♦ Tambah Karya" : "♣ Tambah Foto Album";
            document.getElementById('m-file').value = "";
            document.getElementById('m-link').value = "";
            document.getElementById('m-head').value = "";
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeM() { document.getElementById('modal').classList.add('hidden'); }

        function processSave() {
            let file = document.getElementById('m-file').files[0];
            let link = document.getElementById('m-link').value;
            let title = document.getElementById('m-head').value;
            
            if(!file && !link && !title) return alert("Harap isi setidaknya Judul atau Link/Foto!");
            
            document.getElementById('save-btn').disabled = true;
            document.getElementById('loading').classList.remove('hidden');

            const finalize = (imgStr) => {
                db[curType].unshift({ img: imgStr, link: link, title: title });
                document.getElementById('save-btn').disabled = false;
                document.getElementById('loading').classList.add('hidden');
                closeM(); saveDB();
            };

            // LOGIC AUTO GAMBAR DARI LINK
            if(file) {
                compress(file, finalize);
            } else if(link) {
                // Cek apakah link langsung menuju gambar .jpg/.png
                if(link.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
                    finalize(link);
                } else {
                    // JIKA LINK WEBSITE BIASA, OTOMATIS AMBIL SCREENSHOT WEBSITE-NYA
                    finalize(`https://image.thum.io/get/width/600/crop/800/${link}`);
                }
            } else {
                finalize(null);
            }
        }

        function editItem(type, idx) {
            let nH = prompt("Edit Judul:", db[type][idx].title);
            let nL = prompt("Edit Link:", db[type][idx].link);
            if(nH !== null) db[type][idx].title = nH;
            if(nL !== null) db[type][idx].link = nL;
            saveDB();
        }

        function del(type, idx) {
            if(confirm("Yakin ingin menghapus data ini?")) {
                db[type].splice(idx, 1); saveDB();
            }
        }

        // SIMPAN & RENDER KE LAYAR
        function saveDB() {
            localStorage.setItem('f_p', JSON.stringify(db.p));
            localStorage.setItem('f_r', JSON.stringify(db.r));
            localStorage.setItem('f_k', JSON.stringify(db.k));
            localStorage.setItem('f_a', JSON.stringify(db.a));
            render();
        }

        function render() {
            // Tombol Login/Logout
            document.getElementById('log-btn').innerText = isAdmin ? "🔴 LOGOUT ADMIN" : "LOGIN ADMIN";
            
            // Tombol Add (Hanya Admin)
            document.getElementById('btn-edit-profil').innerHTML = isAdmin ? `<button onclick="editProfil()" class="absolute top-4 right-4 bg-yellow-400 p-3 rounded-full shadow-lg z-20"><i class="fas fa-pen"></i></button>` : '';
            document.getElementById('btn-add-r').innerHTML = isAdmin ? `<button onclick="addR()" class="bg-red-700 text-white px-3 py-1.5 rounded text-xs font-bold">+ TAMBAH</button>` : '';
            document.getElementById('btn-add-k').innerHTML = isAdmin ? `<button onclick="openM('k')" class="bg-red-700 text-white px-3 py-1.5 rounded text-xs font-bold">+ BARU</button>` : '';
            document.getElementById('btn-add-a').innerHTML = isAdmin ? `<button onclick="openM('a')" class="bg-slate-900 text-white px-3 py-1.5 rounded text-xs font-bold">+ FOTO</button>` : '';

            // Render Profil
            document.getElementById('p-name').innerText = db.p.n;
            document.getElementById('p-bio').innerText = db.p.b;
            if(db.p.f) { 
                document.getElementById('p-img').src = db.p.f; 
                document.getElementById('p-img').classList.remove('hidden'); 
                document.getElementById('p-ico').classList.add('hidden'); 
            }
            // Ganti foto profile on click jika admin
            document.getElementById('p-img').parentElement.onclick = isAdmin ? gantiFoto : null;

            // Render Riwayat
            document.getElementById('r-list').innerHTML = '';
            db.r.forEach((x, i) => {
                let tools = isAdmin ? `<div class="absolute top-0 right-0 flex gap-2"><button onclick="editR(${i})" class="text-yellow-500"><i class="fas fa-edit"></i></button><button onclick="del('r', ${i})" class="text-red-500"><i class="fas fa-trash"></i></button></div>` : '';
                document.getElementById('r-list').innerHTML += `<div class="relative border-l-4 border-red-700 pl-4 py-1 hover:bg-slate-50 transition"><b class="text-base block">${x.i}</b><span class="text-xs text-slate-500 font-bold bg-slate-100 px-2 py-0.5 rounded">${x.t}</span>${tools}</div>`;
            });

            // Render Karya
            document.getElementById('k-list').innerHTML = '';
            db.k.forEach((x, i) => {
                let imgHtml = x.img ? `<img src="${x.img}" class="w-full h-32 object-cover rounded-lg mb-3 shadow">` : '';
                let linkHtml = x.link ? `<a href="${x.link}" target="_blank" class="text-blue-600 text-xs font-bold underline"><i class="fas fa-external-link-alt"></i> Kunjungi Tautan</a>` : '';
                let tools = isAdmin ? `<div class="absolute top-2 right-2 flex gap-1"><button onclick="editItem('k', ${i})" class="bg-yellow-400 w-7 h-7 rounded-full shadow"><i class="fas fa-pen text-xs"></i></button><button onclick="del('k', ${i})" class="bg-red-500 text-white w-7 h-7 rounded-full shadow"><i class="fas fa-trash text-xs"></i></button></div>` : '';
                
                document.getElementById('k-list').innerHTML += `<div class="relative border-2 border-slate-100 bg-slate-50 p-3 rounded-xl hover:shadow-lg transition-all">${imgHtml}<b class="block text-sm mb-1 text-slate-900">${x.title}</b>${linkHtml}${tools}</div>`;
            });

            // Render Album
            document.getElementById('a-list').innerHTML = '';
            db.a.forEach((x, i) => {
                let imgHtml = x.img ? `<img src="${x.img}" class="w-full h-full object-cover">` : `<div class="flex items-center justify-center h-full text-center p-2 text-xs font-bold bg-slate-200">${x.title}</div>`;
                let linkHtml = x.link ? `<a href="${x.link}" target="_blank" class="absolute inset-0 z-10"></a>` : '';
                let tools = isAdmin ? `<div class="absolute top-1 right-1 flex gap-1 z-20"><button onclick="editItem('a', ${i})" class="bg-yellow-400 w-6 h-6 rounded-full shadow"><i class="fas fa-pen text-[10px]"></i></button><button onclick="del('a', ${i})" class="bg-red-500 text-white w-6 h-6 rounded-full shadow"><i class="fas fa-trash text-[10px]"></i></button></div>` : '';

                document.getElementById('a-list').innerHTML += `<div class="relative aspect-square border-4 border-white rounded-xl overflow-hidden shadow-md group">${linkHtml}${imgHtml}<div class="absolute bottom-0 w-full bg-black/60 p-2 text-white text-[9px] text-center font-bold uppercase truncate">${x.title}</div>${tools}</div>`;
            });
        }
        
        // Render pertama kali saat web dibuka
        window.onload = render;
    </script>
</body>
</html>
