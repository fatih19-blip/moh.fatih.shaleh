<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Mohammad Fatih Shaleh</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function PortfolioPoker() {
            const [activeSection, setActiveSection] = useState('profil');
            const [isAdmin, setIsAdmin] = useState(false);
            const [isAnimating, setIsAnimating] = useState(false);
            
            const [modalType, setModalType] = useState(null); 
            const [showLogin, setShowLogin] = useState(false);
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(false);
            
            const [selectedImage, setSelectedImage] = useState(null);

            const [formLokasi, setFormLokasi] = useState('');
            const [formImageBase64, setFormImageBase64] = useState(null);
            const [isLocating, setIsLocating] = useState(false);
            const [isCompressing, setIsCompressing] = useState(false);

            // Data Dikosongkan
            const defaultKarya = [];
            const defaultKegiatan = [];

            const [karya, setKarya] = useState(() => {
                const saved = localStorage.getItem('fatih_karya');
                return saved ? JSON.parse(saved) : defaultKarya;
            });

            const [kegiatan, setKegiatan] = useState(() => {
                const saved = localStorage.getItem('fatih_kegiatan');
                return saved ? JSON.parse(saved) : defaultKegiatan;
            });

            // Template Riwayat (Bisa diedit manual di kodingan jika ingin ditambahkan permanen)
            const riwayatPendidikan = [
                { id: 1, tahun: 'Sekarang', instansi: 'Universitas ...', jurusan: 'Manajemen Pendidikan', deskripsi: 'Mahasiswa aktif.' }
            ];

            const riwayatOrganisasi = [
                { id: 1, tahun: 'Periode', peran: 'Jabatan Pengurus', organisasi: 'Organisasi Intra Kampus', deskripsi: 'Berkontribusi dalam pengelolaan program kerja dan dinamika organisasi kampus.' },
                { id: 2, tahun: 'Periode', peran: 'Anggota Aktif', organisasi: 'Organisasi Ekstra Kampus', deskripsi: 'Membangun relasi dan mengembangkan kapasitas manajerial di luar lingkup akademik.' }
            ];

            const keaktifan = [];

            const handleNavChange = (id) => {
                if (id !== activeSection) {
                    setIsAnimating(true);
                    setActiveSection(id);
                    setTimeout(() => setIsAnimating(false), 600);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                // PASSWORD ADMIN DI SINI
                if (password === 'Fatih_123') { 
                    setIsAdmin(true);
                    setShowLogin(false);
                    setPassword('');
                    setLoginError(false);
                } else {
                    setLoginError(true);
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsCompressing(true);
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000;
                        let scaleSize = 1;
                        if (img.width > MAX_WIDTH) {
                            scaleSize = MAX_WIDTH / img.width;
                        }
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        setFormImageBase64(dataUrl);
                        setIsCompressing(false);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleGetLocation = () => {
                setIsLocating(true);
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const lat = position.coords.latitude;
                            const lon = position.coords.longitude;
                            try {
                                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                                const data = await res.json();
                                const locName = data.address.city || data.address.town || data.address.village || data.address.suburb || data.address.state || "Lokasi Saat Ini";
                                setFormLokasi(locName);
                            } catch (error) {
                                setFormLokasi(`Lat: ${lat.toFixed(2)}, Lon: ${lon.toFixed(2)}`);
                            }
                            setIsLocating(false);
                        },
                        (error) => {
                            setFormLokasi("Izin lokasi tidak diberikan");
                            setIsLocating(false);
                        }
                    );
                } else {
                    setFormLokasi("Fitur lokasi tidak didukung");
                    setIsLocating(false);
                }
            };

            const handleAddData = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                
                if (modalType === 'karya') {
                    const newKarya = {
                        id: Date.now(),
                        tipe: formData.get('tipe'),
                        judul: formData.get('judul'),
                        deskripsi: formData.get('deskripsi'),
                        link: formData.get('link'),
                        img: formImageBase64 || `https://placehold.co/600x400/1e293b/ffffff?text=${formData.get('judul').split(' ').join('+')}`
                    };
                    const updatedData = [newKarya, ...karya];
                    setKarya(updatedData);
                    localStorage.setItem('fatih_karya', JSON.stringify(updatedData));
                } else if (modalType === 'kegiatan') {
                    const newKegiatan = {
                        id: Date.now(),
                        judul: formData.get('judul'),
                        tanggal: formData.get('tanggal'),
                        lokasi: formLokasi,
                        img: formImageBase64 || `https://placehold.co/800x800/1e293b/ffffff?text=${formData.get('judul').split(' ').join('+')}`
                    };
                    const updatedData = [newKegiatan, ...kegiatan];
                    setKegiatan(updatedData);
                    localStorage.setItem('fatih_kegiatan', JSON.stringify(updatedData));
                }
                
                setModalType(null);
                setFormLokasi('');
                setFormImageBase64(null);
            };

            const openModal = (type) => {
                setModalType(type);
                setFormLokasi('');
                setFormImageBase64(null);
            };

            const PlayingCard = ({ suit, value, color, children, delay = "0s", className = "" }) => {
                const isRed = color === 'red';
                const textColor = isRed ? 'text-red-700' : 'text-slate-900';
                
                return (
                    <div className={`bg-white rounded-xl border-2 border-slate-200 shadow-[0_15px_35px_rgba(0,0,0,0.25)] relative p-8 md:p-10 card-animate hover:-translate-y-2 transition-transform duration-300 ${className}`} style={{ animationDelay: delay }}>
                        <div className="absolute inset-0 opacity-[0.03] pointer-events-none flex items-center justify-center overflow-hidden">
                            <span className="text-[20rem] leading-none">{suit}</span>
                        </div>
                        <div className={`absolute top-3 left-3 flex flex-col items-center ${textColor}`}>
                            <span className="text-xl md:text-2xl font-serif font-bold leading-none">{value}</span>
                            <span className="text-2xl md:text-3xl leading-none">{suit}</span>
                        </div>
                        <div className={`absolute bottom-3 right-3 flex flex-col items-center rotate-180 ${textColor}`}>
                            <span className="text-xl md:text-2xl font-serif font-bold leading-none">{value}</span>
                            <span className="text-2xl md:text-3xl leading-none">{suit}</span>
                        </div>
                        <div className="px-2 md:px-4 py-2 h-full relative z-10">
                            {children}
                        </div>
                    </div>
                );
            };

            const NavChip = ({ id, label, suit, color }) => (
                <button
                    onClick={() => handleNavChange(id)}
                    className={`flex flex-col items-center justify-center shrink-0 w-[5rem] h-[5rem] md:w-[5.5rem] md:h-[5.5rem] rounded-full border-[4px] transition-all duration-300 ease-out shadow-lg snap-center outline-none ${
                        activeSection === id 
                        ? `bg-white border-yellow-400 scale-110 z-10 shadow-[0_0_20px_rgba(250,204,21,0.4)] ${color === 'red' ? 'text-red-700' : 'text-slate-900'}` 
                        : 'bg-slate-800 border-slate-600 text-white hover:bg-slate-700 hover:scale-105 hover:-translate-y-1'
                    }`}
                >
                    <span className="text-2xl md:text-3xl mb-0.5 filter drop-shadow-sm">{suit}</span>
                    <span className="text-[10px] md:text-xs font-bold tracking-wider">{label}</span>
                </button>
            );

            return (
                <div className="min-h-screen bg-[#1c3a27] text-slate-800 font-sans selection:bg-red-200 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-[#2e523b] to-[#14281b] overflow-x-hidden">
                    <style>{`
                        @keyframes dealCard {
                            0% { transform: translateY(60px) scale(0.9) rotate(-3deg); opacity: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
                            70% { transform: translateY(-5px) scale(1.02) rotate(1deg); opacity: 1; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
                            100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; box-shadow: 0 15px 35px rgba(0,0,0,0.25); }
                        }
                        .card-animate { opacity: 0; animation: dealCard 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
                        .hide-scroll::-webkit-scrollbar { display: none; }
                        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
                    `}</style>

                    <header className="relative pt-8 pb-6 px-2 md:px-4 z-40 w-full">
                        <div className="max-w-4xl mx-auto flex md:justify-center gap-4 overflow-x-auto snap-x snap-mandatory px-4 pb-4 pt-2 hide-scroll">
                            <NavChip id="profil" label="PROFIL" suit="♠" color="black" />
                            <NavChip id="riwayat" label="RIWAYAT" suit="♥" color="red" />
                            <NavChip id="keaktifan" label="AKTIF" suit="♣" color="black" />
                            <NavChip id="karya" label="KARYA" suit="♦" color="red" />
                            <NavChip id="kegiatan" label="ALBUM" suit="🃏" color="black" />
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 pb-16 min-h-[60vh]">
                        {/* PROFIL */}
                        {activeSection === 'profil' && (
                            <div key={`profil-${isAnimating}`}>
                                <PlayingCard suit="♠" value="A" color="black">
                                    <div className="flex flex-col md:flex-row items-center gap-8 text-center md:text-left py-4">
                                        <div className="w-48 h-48 rounded-full border-4 border-slate-900 overflow-hidden shadow-inner shrink-0 relative flex items-center justify-center bg-slate-100">
                                            <i className="fas fa-user-tie text-6xl text-slate-400"></i>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="inline-block px-4 py-1.5 border-2 border-slate-900 text-slate-900 rounded-full text-xs font-bold tracking-widest uppercase">Mahasiswa Manajemen Pendidikan</div>
                                            <h2 className="text-4xl md:text-5xl font-serif font-bold text-slate-900">Mohammad Fatih Shaleh</h2>
                                            <p className="text-base md:text-lg text-slate-600 leading-relaxed">
                                                Saya adalah mahasiswa program studi Manajemen Pendidikan yang memiliki dedikasi tinggi terhadap pengembangan pendidikan dan dinamika keorganisasian. Saya secara konsisten berperan aktif dalam berbagai organisasi intra kampus maupun ekstra kampus guna mengasah kemampuan kepemimpinan, kerja sama tim, serta keterampilan manajerial secara profesional.
                                            </p>
                                        </div>
                                    </div>
                                </PlayingCard>
                            </div>
                        )}

                        {/* RIWAYAT */}
                        {activeSection === 'riwayat' && (
                            <div key={`riwayat-${isAnimating}`}>
                                <PlayingCard suit="♥" value="K" color="red">
                                    <div className="text-center mb-10">
                                        <h2 className="text-3xl font-serif font-bold text-red-700">Riwayat Perjalanan</h2>
                                        <div className="w-16 h-1.5 bg-red-700 mx-auto mt-4 rounded-full"></div>
                                    </div>
                                    <div className="grid md:grid-cols-2 gap-10">
                                        <div>
                                            <h3 className="text-xl font-bold mb-6 flex items-center justify-center md:justify-start gap-3 text-slate-900 bg-red-50 p-3 rounded-lg border border-red-100"><span className="text-red-700 text-2xl">♥</span> Pendidikan</h3>
                                            <div className="space-y-6">
                                                {riwayatPendidikan.length === 0 ? (
                                                    <p className="text-slate-500 text-sm text-center md:text-left">Belum ada riwayat pendidikan yang ditambahkan.</p>
                                                ) : riwayatPendidikan.map((item) => (
                                                    <div key={item.id} className="border-l-4 border-red-700 pl-4 py-1 hover:bg-red-50/50 transition px-2 rounded-r-lg">
                                                        <span className="text-red-700 font-bold text-sm bg-red-100 px-2 py-0.5 rounded">{item.tahun}</span>
                                                        <h4 className="text-lg font-bold text-slate-900 mt-2">{item.instansi}</h4>
                                                        <p className="font-medium text-slate-700">{item.jurusan}</p>
                                                        <p className="text-slate-600 text-sm mt-1">{item.deskripsi}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold mb-6 flex items-center justify-center md:justify-start gap-3 text-slate-900 bg-slate-100 p-3 rounded-lg border border-slate-200"><span className="text-slate-900 text-2xl">♠</span> Organisasi</h3>
                                            <div className="space-y-6">
                                                {riwayatOrganisasi.length === 0 ? (
                                                    <p className="text-slate-500 text-sm text-center md:text-left">Belum ada riwayat organisasi yang ditambahkan.</p>
                                                ) : riwayatOrganisasi.map((item) => (
                                                    <div key={item.id} className="border-l-4 border-slate-900 pl-4 py-1 hover:bg-slate-50 transition px-2 rounded-r-lg">
                                                        <span className="text-slate-900 font-bold text-sm bg-slate-200 px-2 py-0.5 rounded">{item.tahun}</span>
                                                        <h4 className="text-lg font-bold text-slate-900 mt-2">{item.peran}</h4>
                                                        <p className="font-medium text-slate-700">{item.organisasi}</p>
                                                        <p className="text-slate-600 text-sm mt-1">{item.deskripsi}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </PlayingCard>
                            </div>
                        )}

                        {/* KEAKTIFAN */}
                        {activeSection === 'keaktifan' && (
                            <div key={`keaktifan-${isAnimating}`}>
                                <PlayingCard suit="♣" value="Q" color="black">
                                    <div className="text-center mb-10">
                                        <h2 className="text-3xl font-serif font-bold text-slate-900">Keaktifan & Partisipasi</h2>
                                        <div className="w-16 h-1.5 bg-slate-900 mx-auto mt-4 rounded-full"></div>
                                    </div>
                                    {keaktifan.length === 0 ? (
                                        <div className="text-center py-10 text-slate-500">
                                            <i className="fas fa-calendar-times text-4xl mb-3"></i>
                                            <p>Belum ada catatan keaktifan.</p>
                                        </div>
